---
site:
  title: "Architecting Intelligent Enterprise Systems: From Scratch"
  start_page: modules::index.adoc

content:
  sources:
    - url: .
      start_path: llm-springboot/site/content

ui:
  bundle:
    url: https://github.com/rhpds/rhdp_showroom_theme/releases/download/v0.0.1/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./llm-springboot/site/content/supplemental-ui
    - path: ./llm-springboot/site/content/lib
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

runtime:
  cache_dir: ./.cache/antora

antora:
  extensions:
    - require: ./llm-springboot/site/content/lib/dev-mode.js
      enabled: true

output:
  dir: ./llm-springboot/site/www
