# Module 03: Tools and MCP Configuration

# Application
spring.application.name=module-03-tools-mcp
server.port=8083

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/workshop_db
spring.datasource.username=workshop
