spring:
  application:
    name: module-06-enterprise-production

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour

  # Note: the `spring.ai.openai.*` block from earlier drafts was removed when
  # Spring AI was dropped from this module (incompatible with Spring Boot 4).
  # Both the primary chat model and the Dokimos judge are wired from the
  # plain `openai.*` block below via LangChain4J — see LLMConfig and
  # DokimosEvaluationConfig.

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

openai:
  api:
    key: ${OPENAI_API_KEY}
  model:
    name: ${OPENAI_MODEL_NAME:gpt-4o-mini}
    embedding: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

evaluation:
  dataset:
    path: data/eval-golden-set.json

# Dokimos Evaluation Configuration
dokimos:
  judge:
    model: ${DOKIMOS_JUDGE_MODEL:gpt-4o}  # judge benefits from the stronger model
    temperature: 0.0
    timeout-seconds: 60
  evaluators:
    faithfulness:
      enabled: true
      threshold: 0.7
    hallucination:
      enabled: true
      threshold: 0.8
    contextual-relevance:
      enabled: true
      threshold: 0.7
    exact-match:
      enabled: true
    response-length:
      enabled: true
      min-chars: 50
      max-chars: 1000
    citation-quality:
      enabled: true
      min-citations: 2
      threshold: 1.0

semantic-cache:
  enabled: true
  similarity-threshold: 0.95
  ttl-seconds: 3600

token-optimizer:
  max-tokens: 4000
  compression-enabled: true

logging:
  level:
    com.techcorp.assistant.module06: DEBUG
    io.opentelemetry: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
