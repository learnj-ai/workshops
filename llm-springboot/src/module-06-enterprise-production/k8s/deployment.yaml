apiVersion: apps/v1
kind: Deployment
metadata:
  name: module-06-production
  labels:
    app: module-06-production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: module-06-production
  template:
    metadata:
      labels:
        app: module-06-production
    spec:
      containers:
        - name: application
          image: module-06-production:latest
          ports:
            - containerPort: 8086
              protocol: TCP
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: api-key
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: module-06-service
  labels:
    app: module-06-production
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8086
      protocol: TCP
      name: http
  selector:
    app: module-06-production
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: module-06-route
  labels:
    app: module-06-production
spec:
  to:
    kind: Service
    name: module-06-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
type: Opaque
stringData:
  api-key: "YOUR_OPENAI_API_KEY_HERE"
