# Module 04: From Chatbots to Agents Configuration

spring:
  application:
    name: module-04-chatbots-to-agents
  datasource:
    url: jdbc:postgresql://localhost:5432/workshop_module04
    username: workshop
    password: workshop123
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

server:
  port: 8084

openai:
  api:
    key: ${OPENAI_API_KEY:your-api-key-here}
  model:
    name: gpt-4o-mini
  temperature: 0.7

agent:
  react:
    max-iterations: 5
  memory:
    max-messages: 20
    ttl-hours: 24

logging:
  level:
    com.techcorp.assistant: DEBUG
    dev.langchain4j: DEBUG
