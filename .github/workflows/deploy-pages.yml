name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'llm-springboot/site/**'
      - 'default-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Antora site
        run: |
          docker run --user=$(id -u) --rm -v `pwd`:/showroom/repo --mount 'type=tmpfs,dst=/showroom/repo/.cache,tmpfs-mode=1777' --entrypoint antora -w /showroom/repo ghcr.io/rhpds/showroom-content:latest default-site.yml
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
