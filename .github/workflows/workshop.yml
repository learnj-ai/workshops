name: Tutorial

on:
  push:
    branches: [main]
    paths:
      - 'llm-springboot/docs/tutorials/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build tutorial book
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install HonKit and plugins
        working-directory: docs/tutorial
        run: npm install honkit honkit-plugin-mermaid-hybrid

      - name: Build HonKit book
        working-directory: docs/tutorial
        run: npx honkit build . _book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/tutorial/_book

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
